<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Draw Final</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body,html{
margin:0;
overflow:hidden;
background:black;
}
#output_canvas{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
transform: scaleX(-1);
}
#input_video{
display:none;
}
</style>
</head>

<body>

<video id="input_video" autoplay playsinline muted></video>
<canvas id="output_canvas"></canvas>

<script>
const video = document.getElementById("input_video");
const canvas = document.getElementById("output_canvas");
const ctx = canvas.getContext("2d");

let drawings=[];
let currentPath=null;

// smoothing
let sx=0, sy=0;
const smooth=0.65;

// resize
function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// distance
function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}

// gestures
function isDraw(lm){
return lm[8].y < lm[6].y;
}

function isVictory(lm){
return lm[8].y < lm[6].y && lm[12].y < lm[10].y;
}

// forward hand
function isForward(lm){
return lm[8].z < -0.1;
}

// auto shape
function detectShape(path){

if(path.length < 10) return path;

let minX=Infinity,maxX=-Infinity;
let minY=Infinity,maxY=-Infinity;

path.forEach(p=>{
minX=Math.min(minX,p.x);
maxX=Math.max(maxX,p.x);
minY=Math.min(minY,p.y);
maxY=Math.max(maxY,p.y);
});

let w=maxX-minX;
let h=maxY-minY;
let ratio=w/h;

// circle
if(ratio>0.7 && ratio<1.3){
let cx=(minX+maxX)/2;
let cy=(minY+maxY)/2;
let r=Math.max(w,h)/2;

let newPath=[];
for(let i=0;i<50;i++){
let a=(i/50)*Math.PI*2;
newPath.push({
x:cx+r*Math.cos(a),
y:cy+r*Math.sin(a)
});
}
return newPath;
}

// line
let start=path[0];
let end=path[path.length-1];

if(dist(start,end)>100){
return [start,end];
}

return path;
}

// cooldown
let lastClear=0;

function onResults(res){

// clear screen
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

// draw old
drawings.forEach(d=>{
if(d.length<2) return;

ctx.beginPath();
ctx.strokeStyle="red";
ctx.lineWidth=5;
ctx.shadowBlur=15;
ctx.shadowColor="red";

ctx.moveTo(d[0].x,d[0].y);

for(let i=1;i<d.length;i++){
let p=d[i];
let prev=d[i-1];
let mx=(p.x+prev.x)/2;
let my=(p.y+prev.y)/2;
ctx.quadraticCurveTo(prev.x,prev.y,mx,my);
}

ctx.stroke();
ctx.shadowBlur=0;
});

// ✅ SAFE HAND CHECK (MAIN FIX)
if(res.multiHandLandmarks && res.multiHandLandmarks.length>0){

let lm=res.multiHandLandmarks[0];

// extra safety
if(!lm || !lm[8]) return;

let rawX=lm[8].x*canvas.width;
let rawY=lm[8].y*canvas.height;

// smooth
sx=sx*smooth+rawX*(1-smooth);
sy=sy*smooth+rawY*(1-smooth);

let point={x:sx,y:sy};

// ✌️ clear
if(isVictory(lm) && Date.now()-lastClear>800){
drawings=[];
lastClear=Date.now();
}

// draw
else if(isDraw(lm) && isForward(lm)){

if(!currentPath){
currentPath=[];
drawings.push(currentPath);
}

// gap fix
if(currentPath.length>0){
let last=currentPath[currentPath.length-1];
let d=dist(last,point);

if(d>15){
let steps=Math.floor(d/8);
for(let i=1;i<=steps;i++){
let t=i/steps;
currentPath.push({
x:last.x+(point.x-last.x)*t,
y:last.y+(point.y-last.y)*t
});
}
}
}

currentPath.push(point);

}else{

// auto shape on release
if(currentPath && currentPath.length>5){
let fixed=detectShape(currentPath);
drawings[drawings.length-1]=fixed;
}

currentPath=null;
}

// skeleton
ctx.strokeStyle="cyan";
ctx.lineWidth=3;
ctx.shadowBlur=10;
ctx.shadowColor="cyan";

const c=[
[0,1],[1,2],[2,3],[3,4],
[0,5],[5,6],[6,7],[7,8],
[5,9],[9,10],[10,11],[11,12],
[9,13],[13,14],[14,15],[15,16],
[13,17],[17,18],[18,19],[19,20],
[0,17]
];

c.forEach(([a,b])=>{
ctx.beginPath();
ctx.moveTo(lm[a].x*canvas.width,lm[a].y*canvas.height);
ctx.lineTo(lm[b].x*canvas.width,lm[b].y*canvas.height);
ctx.stroke();
});

ctx.shadowBlur=0;

}else{
// no hand → stop drawing safely
currentPath=null;
}

}

// mediapipe
const hands=new Hands({
locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(onResults);

// camera
const camera=new Camera(video,{
onFrame: async()=>{
await hands.send({image:video});
},
width:640,
height:480
});

// start (browser safe)
document.body.addEventListener("click",()=>{
camera.start();
},{once:true});

</script>

</body>
</html>
